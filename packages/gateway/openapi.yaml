    post:
      tags: [Conversations]
      summary: Create a saved conversation
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                title:
                  type: string
                  description: Optional title. Auto-generated from first user message if omitted.
                messages:
                  type: array
                  description: Serialized ChatMessage[] array.
                  items:
                    type: object
