    patch:
      tags: [Tokens]
      summary: Update a token
      operationId: updateToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                rateLimit:
                  type: integer
                spendLimit:
                  type: number
                spendPeriod:
                  type: string
                routingProfile:
                  type: string
      responses:
        "200":
          description: Updated

    delete:
      tags: [Tokens]
      summary: Delete a token
      operationId: deleteToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /v1/admin/tokens/usage/by-tenant:
    get:
      tags: [Tokens]
      summary: Usage breakdown by tenant
      operationId: usageByTenant
      responses:
        "200":
          description: Tenant usage stats

  /v1/ab-tests:
    get:
      tags: [A/B Tests]
      summary: List A/B tests
      operationId: listAbTests
      responses:
        "200":
          description: A/B test list

    post:
      tags: [A/B Tests]
      summary: Create an A/B test
      operationId: createAbTest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, variants]
              properties:
                name:
                  type: string
                  example: GPT-4o vs Claude Sonnet
                description:
                  type: string
                variants:
                  type: array
                  items:
                    type: object
                    required: [provider, model]
                    properties:
                      provider:
                        type: string
                      model:
                        type: string
                      weight:
                        type: number
                        default: 1
                      taskType:
                        type: string
                      complexity:
                        type: string
                  example:
                    - provider: openai
                      model: gpt-4o
                      weight: 1
                    - provider: anthropic
                      model: claude-sonnet-4-20250514
                      weight: 1
      responses:
        "201":
          description: Created

  /v1/ab-tests/{id}:
    get:
      tags: [A/B Tests]
      summary: Get A/B test with variants and stats
      operationId: getAbTest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A/B test details

    patch:
      tags: [A/B Tests]
      summary: Update A/B test status
      operationId: updateAbTest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, paused, completed]
      responses:
        "200":
          description: Updated

    delete:
      tags: [A/B Tests]
      summary: Delete an A/B test
      operationId: deleteAbTest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /v1/feedback:
    get:
      tags: [Feedback]
      summary: List feedback entries
      operationId: listFeedback
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Feedback list

    post:
      tags: [Feedback]
      summary: Submit or update user feedback for a request
      description: |
        Upserts on `(requestId, source='user', tenantId)`. First submission inserts a row
        and pushes the score into the adaptive EMA; subsequent submissions update the
        existing row's score in place and do not re-feed the EMA (avoids double-counting
        the same user's iteration). The response distinguishes insert from update via the
        `updated` boolean.
      operationId: submitFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId, score]
              properties:
                requestId:
                  type: string
                  description: Opaque id from the `X-Provara-Request-Id` response header on the original completion.
                score:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        "200":
          description: Existing feedback row updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSubmitResponse"
        "201":
          description: New feedback row created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSubmitResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Request not found for this tenant

  /v1/feedback/quality/by-cell:
    get:
      tags: [Feedback]
      summary: Quality scores by routing cell
      operationId: qualityByCell
      responses:
        "200":
          description: Quality breakdown

  /v1/feedback/quality/by-model:
    get:
      tags: [Feedback]
      summary: Quality scores by model
      operationId: qualityByModel
      responses:
        "200":
          description: Quality breakdown

  /v1/feedback/quality/trend:
    get:
      tags: [Feedback]
      summary: Quality score trend over time
      operationId: qualityTrend
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [24h, 7d, 30d]
            default: 7d
          description: Time window. `24h` buckets hourly; `7d` and `30d` bucket daily.
      responses:
        "200":
          description: Time-series of avg quality scores bucketed by hour or day
          content:
            application/json:
              schema:
                type: object
                properties:
                  range:
                    type: string
                  series:
                    type: array
                    items:
                      type: object
                      properties:
                        bucket:
                          type: string
                          example: "2026-04-16"
                        avgScore:
                          type: number
                          format: float
                        count:
                          type: integer
                        userCount:
                          type: integer
                        judgeCount:
                          type: integer

  /v1/feedback/judge/config:
    get:
      tags: [Feedback]
      summary: Get LLM judge configuration
      operationId: getJudgeConfig
      responses:
        "200":
          description: Current judge configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JudgeConfig"
    put:
      tags: [Feedback]
      summary: Update LLM judge configuration
      description: |
        All fields optional — only the ones you send are updated. Set `provider` and
        `model` together to pin the judge to a specific model; set both to `null` to
        fall back to auto (cheapest registered model).
      operationId: setJudgeConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                sampleRate:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                provider:
                  type: string
                  nullable: true
                model:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated judge config (current effective state)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JudgeConfig"

  /v1/routing/config:
    get:
      tags: [Routing]
      summary: Get routing configuration
      operationId: getRoutingConfig
      responses:
        "200":
          description: Current routing configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingConfig"
    put:
      tags: [Routing]
      summary: Update routing configuration
      operationId: setRoutingConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                abTestPreempts:
                  type: boolean
                  description: |
                    When `true` (default), an active A/B test on a cell takes precedence over
                    adaptive routing. When `false`, adaptive routing wins if it has enough
                    samples, and A/B tests only fire when adaptive can't help.
      responses:
        "200":
          description: Updated routing config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingConfig"

  /v1/analytics/pipeline:
    get:
      tags: [Analytics]
      summary: Routing pipeline stage statistics
      description: |
        Per-stage request counts and latencies for the routing pipeline visualization.
        Includes `userOverride` (requests pinned to a specific model by the caller) and
        true `fallback` events (provider failures that triggered the fallback chain) as
        distinct stages.
      operationId: pipelineStats
      responses:
        "200":
          description: Pipeline statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStats"

  /v1/analytics/requests:
    get:
      tags: [Analytics]
      summary: List requests with pagination
      operationId: listRequests
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: provider
          in: query
          schema:
            type: string
        - name: model
          in: query
          schema:
            type: string
        - name: taskType
          in: query
          schema:
            type: string
        - name: orderBy
          in: query
          description: Column to sort by. Values outside the server whitelist are ignored (falls back to `createdAt`).
          schema:
            type: string
            enum: [createdAt, latencyMs, inputTokens, outputTokens, provider, model, taskType, complexity, routedBy, cost]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated request list including `cached`, `usedFallback`, and `fallbackErrors` per row.
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/RequestLogRow"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /v1/analytics/requests/{id}:
    get:
      tags: [Analytics]
      summary: Get full detail for a single request
      operationId: getRequest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Request detail with persisted routing metadata and fallback errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestLogRow"
        "404":
          description: Request not found for this tenant

  /v1/analytics/overview:
    get:
      tags: [Analytics]
      summary: Dashboard overview stats
      operationId: analyticsOverview
      responses:
        "200":
          description: Overview metrics

  /v1/analytics/costs/by-provider:
    get:
      tags: [Analytics]
      summary: Cost breakdown by provider
      operationId: costsByProvider
      responses:
        "200":
          description: Provider costs

  /v1/analytics/costs/by-model:
    get:
      tags: [Analytics]
      summary: Cost breakdown by model
      operationId: costsByModel
      responses:
        "200":
          description: Model costs

  /v1/analytics/routing/stats:
    get:
      tags: [Analytics]
      summary: Routing method statistics
      operationId: routingStats
      responses:
        "200":
          description: Routing stats

  /v1/analytics/routing/distribution:
    get:
      tags: [Analytics]
      summary: Request distribution by provider
      operationId: routingDistribution
      responses:
        "200":
          description: Distribution data

  /v1/analytics/adaptive/scores:
    get:
      tags: [Analytics]
      summary: Adaptive routing EMA scores
      operationId: adaptiveScores
      responses:
        "200":
          description: Adaptive scores by cell

  /v1/cache/stats:
    get:
      tags: [Cache]
      summary: Cache hit/miss statistics
      operationId: cacheStats
      responses:
        "200":
          description: Cache stats

  /v1/analytics/cache/savings:
    get:
      tags: [Cache, Analytics]
      summary: Tokens saved by cache hits (exact + semantic)
      description: |
        Sum of input and output tokens that were served from cache and therefore
        not billed to the upstream provider. Broken down by cache source (exact
        vs semantic) and by model.
      operationId: cacheSavings
      responses:
        "200":
          description: Savings stats
          content:
            application/json:
              schema:
                type: object
                required: [tokensSavedInput, tokensSavedOutput, tokensSavedTotal, hits, hitRate, byModel]
                properties:
                  tokensSavedInput:
                    type: integer
                  tokensSavedOutput:
                    type: integer
                  tokensSavedTotal:
                    type: integer
                  hits:
                    type: object
                    properties:
                      exact: { type: integer }
                      semantic: { type: integer }
                      total: { type: integer }
                  hitRate:
                    type: number
                    description: Cache hits / total requests (0–1)
                  byModel:
                    type: array
                    items:
                      type: object
                      properties:
                        provider: { type: string }
                        model: { type: string }
                        tokensSavedInput: { type: integer }
                        tokensSavedOutput: { type: integer }
                        hits: { type: integer }

  /v1/regression/status:
    get:
      tags: [Regression Detection]
      summary: Opt-in state, bank size, and weekly budget usage
      description: |
        Returns whether silent-regression detection is enabled for the caller's
        tenant (#152), the number of prompts currently stored in the replay bank,
        and the USD spent this ISO week against the replay budget.
      operationId: regressionStatus
      responses:
        "200":
          description: Status payload
          content:
            application/json:
              schema:
                type: object
                required: [enabled, budget, bankSize, defaultWeeklyBudgetUsd]
                properties:
                  enabled: { type: boolean }
                  bankSize: { type: integer }
                  defaultWeeklyBudgetUsd: { type: number }
                  budget:
                    type: object
                    properties:
                      used: { type: number }
                      limit: { type: number }
                      remaining: { type: number }

  /v1/regression/opt-in:
    post:
      tags: [Regression Detection]
      summary: Toggle regression detection for the caller's tenant
      operationId: regressionOptIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: Updated state
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean }

  /v1/regression/events:
    get:
      tags: [Regression Detection]
      summary: List regression events
      description: |
        Tenant-scoped detection history. Each event captures the cell, the
        baseline mean vs replay mean, the delta, and the judge-spend cost.
      operationId: listRegressionEvents
      parameters:
        - name: unresolvedOnly
          in: query
          schema: { type: boolean }
          description: When true, only return events with `resolvedAt` null.
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/RegressionEvent"

  /v1/regression/events/{id}/resolve:
    post:
      tags: [Regression Detection]
      summary: Mark a regression event resolved
      operationId: resolveRegressionEvent
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
      responses:
        "200":
          description: Resolved
        "404":
          description: Event not found

  /v1/cost-migrations/status:
    get:
      tags: [Cost Migrations]
      summary: Opt-in state and monthly projected savings
      description: |
        Reports whether auto cost migration (#153) is enabled for the caller's
        tenant plus the sum of projected-monthly savings from executed, non-
        rolled-back migrations this month.
      operationId: costMigrationStatus
      responses:
        "200":
          description: Status payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean }
                  savingsThisMonth: { type: number }

  /v1/cost-migrations/opt-in:
    post:
      tags: [Cost Migrations]
      summary: Toggle auto cost migration
      operationId: costMigrationOptIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: Updated state

  /v1/cost-migrations:
    get:
      tags: [Cost Migrations]
      summary: List executed migrations
      description: |
        Tenant-scoped. Includes active (within grace window or past grace but
        not rolled back) and rolled-back entries; distinguish via `rolledBackAt`.
      operationId: listCostMigrations
      responses:
        "200":
          description: Migrations
          content:
            application/json:
              schema:
                type: object
                properties:
                  migrations:
                    type: array
                    items:
                      $ref: "#/components/schemas/CostMigration"

  /v1/cost-migrations/run:
    post:
      tags: [Cost Migrations]
      summary: Trigger a migration cycle manually
      description: |
        Runs the same logic the nightly scheduler runs (candidate detection,
        per-cycle cap, cooldown checks, grace-boost refresh) on demand. Useful
        in demos and during incident response.
      operationId: runCostMigrationCycle
      responses:
        "200":
          description: Cycle stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  evaluated: { type: integer }
                  skippedCooldown: { type: integer }
                  executed:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        taskType: { type: string }
                        complexity: { type: string }
                        projectedMonthlySavingsUsd: { type: number }

  /v1/cost-migrations/{id}/rollback:
    post:
      tags: [Cost Migrations]
      summary: Roll back a migration
      description: Clears the grace boost for the migration target and stamps a rollback reason for audit.
      operationId: rollbackCostMigration
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Rolled back
        "404":
          description: Migration not found or already rolled back

  /v1/admin/scheduler/jobs:
    get:
      tags: [Scheduler]
      summary: List scheduler jobs and their last-run state
      description: |
        Owner-only. Returns every job registered on the in-process scheduler
        (auto-ab, replay-bank-populate, replay-execute, cost-migration, …)
        with its interval, enabled flag, run count, and the outcome of its
        most recent execution.
      operationId: listSchedulerJobs
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/SchedulerJob"
        "401":
          description: Not authenticated
        "403":
          description: Not authorized (owner role required)

  /v1/admin/scheduler/jobs/{name}/run:
    post:
      tags: [Scheduler]
      summary: Trigger a scheduled job immediately
      description: Owner-only. Runs the named job synchronously, respecting the in-progress guard.
      operationId: runSchedulerJob
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
          description: Job name, e.g. `auto-ab`, `replay-execute`, `cost-migration`.
      responses:
        "200":
          description: Ran (or recorded as skipped if already running)
        "404":
          description: Unknown job
        "503":
          description: Scheduler not wired into this deployment

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Provara API token (prefixed `pvra_`)
    SessionCookie:
      type: apiKey
      in: cookie
      name: provara_session
      description: Dashboard session cookie, set after OAuth sign-in. Used for admin endpoints.

  responses:
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InsufficientTier:
      description: Tenant plan does not include the requested feature
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InsufficientTierError"

  schemas:
    ShareToken:
      type: object
      required: [token, createdAt]
      properties:
        token:
          type: string
          description: Opaque public share token; prefixed `sh_`.
        createdAt:
          type: string
          format: date-time

    SharedConversation:
      type: object
      required: [token, title, messages, createdAt, conversationCreatedAt]
      properties:
        token:
          type: string
        title:
          type: string
        messages:
          type: array
          items:
            type: object
        createdAt:
          type: string
          format: date-time
        conversationCreatedAt:
          type: string
          format: date-time

    ConversationSummary:
      type: object
      required: [id, title, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationDetail:
      allOf:
        - $ref: "#/components/schemas/ConversationSummary"
        - type: object
          required: [messages]
          properties:
            messages:
              type: array
              description: Full ChatMessage[] for this conversation.
              items:
                type: object

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type]
          properties:
            message:
              type: string
            type:
              type: string
              example: validation_error

    InsufficientTierError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - type: object
          required: [gate]
          properties:
            gate:
              type: object
              required: [reason, requiredTier]
              properties:
                reason:
                  type: string
                  example: insufficient_tier
                requiredTier:
                  type: string
                  example: pro

    FirewallScanSource:
      type: string
      enum: [user_input, retrieved_context, tool_output, model_output]

    FirewallScanMode:
      type: string
      enum: [signature, semantic, hybrid]

    FirewallDecision:
      type: string
      enum: [allow, flag, redact, block, quarantine]

    ToolCallAlignmentMode:
      type: string
      enum: [off, flag, block]

    FirewallViolation:
      type: object
      required: [ruleId, ruleName, action, matchedSnippet]
      properties:
        ruleId:
          type: string
        ruleName:
          type: string
        action:
          $ref: "#/components/schemas/FirewallDecision"
        matchedSnippet:
          type: string
        pattern:
          type: string
          nullable: true

    FirewallSemanticResult:
      type: object
      required: [flagged, confidence, riskLevel, category, evidence, recommendedAction]
      properties:
        flagged:
          type: boolean
        confidence:
          type: number
          minimum: 0
          maximum: 1
        riskLevel:
          type: string
          enum: [low, medium, high]
        category:
          type: string
          nullable: true
          example: instruction_override
        evidence:
          type: string
          nullable: true
        recommendedAction:
          $ref: "#/components/schemas/FirewallDecision"

    FirewallScanRequest:
      type: object
      required: [content, source]
      properties:
        content:
          type: string
          minLength: 1
        source:
          $ref: "#/components/schemas/FirewallScanSource"
        mode:
          $ref: "#/components/schemas/FirewallScanMode"

    FirewallScanResult:
      type: object
      required: [source, target, decision, passed, content, violations, mode]
      properties:
        source:
          $ref: "#/components/schemas/FirewallScanSource"
        target:
          type: string
          enum: [input, output]
        passed:
          type: boolean
        decision:
          $ref: "#/components/schemas/FirewallDecision"
        violations:
          type: array
          items:
            $ref: "#/components/schemas/FirewallViolation"
        content:
          type: string
          description: Present when a redact rule rewrites direct user/model content.
        mode:
          $ref: "#/components/schemas/FirewallScanMode"
        semantic:
          $ref: "#/components/schemas/FirewallSemanticResult"

    FirewallEvent:
      type: object
      required: [id, surface, decision, action, passed, createdAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
          nullable: true
        requestId:
          type: string
          nullable: true
        surface:
          type: string
          enum: [scan, tool_call_alignment]
        source:
          type: string
          enum: [user_input, retrieved_context, tool_output, model_output]
          nullable: true
        mode:
          type: string
          enum: [signature, semantic, hybrid]
          nullable: true
        decision:
          $ref: "#/components/schemas/FirewallDecision"
        action:
          $ref: "#/components/schemas/FirewallDecision"
        passed:
          type: boolean
        confidence:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
        riskLevel:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        toolName:
          type: string
          nullable: true
        ruleName:
          type: string
          nullable: true
        matchedContent:
          type: string
          nullable: true
        details:
          type: string
          nullable: true
          description: JSON-encoded detail payload.
        createdAt:
          type: string
          format: date-time

    FirewallSettings:
      type: object
      required: [tenantId, defaultScanMode, toolCallAlignment, streamingEnforcement]
      properties:
        tenantId:
          type: string
          nullable: true
        defaultScanMode:
          $ref: "#/components/schemas/FirewallScanMode"
        toolCallAlignment:
          $ref: "#/components/schemas/ToolCallAlignmentMode"
        streamingEnforcement:
          type: boolean

    FirewallCapabilities:
      type: object
      required: [semanticScan, hybridScan]
      properties:
        semanticScan:
          type: boolean
        hybridScan:
          type: boolean

    FirewallSettingsPatch:
      type: object
      properties:
        defaultScanMode:
          $ref: "#/components/schemas/FirewallScanMode"
        toolCallAlignment:
          $ref: "#/components/schemas/ToolCallAlignmentMode"
        streamingEnforcement:
          type: boolean

    FirewallSettingsResponse:
      type: object
      required: [settings, capabilities]
      properties:
        settings:
          $ref: "#/components/schemas/FirewallSettings"
        capabilities:
          $ref: "#/components/schemas/FirewallCapabilities"

    ContextChunk:
      type: object
      required: [id, content]
      properties:
        id:
          type: string
        content:
          type: string
          minLength: 1
        source:
          type: string
        metadata:
          type: object
          additionalProperties: true

    ContextOptimizeRequest:
      type: object
      required: [chunks]
      properties:
        chunks:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: "#/components/schemas/ContextChunk"
        scanRisk:
          type: boolean
          description: When true, scan retained chunks with active guardrail rules for retrieved-context risk.
        dedupeMode:
          type: string
          enum: [exact, semantic]
          default: exact
          description: Exact mode removes normalized text duplicates. Semantic mode also removes deterministic near duplicates.
        semanticThreshold:
          type: number
          minimum: 0.5
          maximum: 1
          default: 0.72
          description: Similarity threshold used when dedupeMode is semantic.
        rankMode:
          type: string
          enum: [none, lexical, embedding]
          default: none
          description: Lexical mode scores retained chunks with deterministic local token matching. Embedding mode scores retained chunks with the configured embedding provider and falls back to lexical scoring when embeddings are unavailable.
        query:
          type: string
          maxLength: 2000
          description: User query used for relevance scoring. Not persisted.
        minRelevanceScore:
          type: number
          minimum: 0
          maximum: 1
          default: 0.2
          description: Chunks below this score are counted as low relevance when rankMode is lexical or embedding.
        freshnessMode:
          type: string
          enum: [off, metadata]
          default: off
          description: Metadata mode scores retained chunks from freshness metadata such as updatedAt and expiresAt.
        maxContextAgeDays:
          type: number
          minimum: 1
          maximum: 3650
          default: 180
          description: Age threshold used to count stale chunks when freshnessMode is metadata.
        referenceTime:
          type: string
          format: date-time
          description: Optional reference time for deterministic freshness scoring. Defaults to server time.
        conflictMode:
          type: string
          enum: [off, heuristic, scored]
          default: off
          description: Heuristic mode detects lightweight status, numeric, and metadata conflicts across retained chunks. Scored mode emits bounded contradiction scores and severity bands.
        compressionMode:
          type: string
          enum: [off, extractive, abstractive]
          default: off
          description: Extractive mode keeps the highest-value sentences using deterministic local scoring. Abstractive mode summarizes retained chunks with the configured provider and falls back to extractive/original content on errors, refusals, or token growth.
        maxSentencesPerChunk:
          type: number
          minimum: 1
          maximum: 8
          default: 3
          description: Maximum retained sentences per chunk when compressionMode is extractive.

    OptimizedContextChunk:
      allOf:
        - $ref: "#/components/schemas/ContextChunk"
        - type: object
          required: [sourceIds, inputTokens, outputTokens]
          properties:
            sourceIds:
              type: array
              items:
                type: string
            inputTokens:
              type: integer
            outputTokens:
              type: integer
            relevanceScore:
              type: number
              description: Relevance score when rankMode is lexical or embedding.
            freshnessScore:
              type: number
              description: Metadata freshness score when freshnessMode is metadata.
            stale:
              type: boolean
              description: Whether the chunk is stale according to metadata freshness scoring.
            conflict:
              type: boolean
              description: Whether this retained chunk participates in a detected conflict.
            conflictGroupIds:
              type: array
              items:
                type: string
              description: Conflict group ids involving this chunk.
            conflictSeverity:
              type: string
              enum: [low, medium, high]
              description: Highest severity band for conflicts involving this retained chunk.
            compressed:
              type: boolean
              description: Whether compression shortened this chunk.
            originalTokens:
              type: integer
              description: Pre-compression token estimate for this retained chunk.
            compressedTokens:
              type: integer
              description: Post-compression token estimate for this retained chunk.

    ContextConflict:
      type: object
      required: [id, kind, chunkIds, sourceIds, topicTokens, leftValue, rightValue]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [status, numeric, metadata]
        chunkIds:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: string
        sourceIds:
          type: array
          items:
            type: string
        topicTokens:
          type: array
          items:
            type: string
        leftValue:
          type: string
        rightValue:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 1
          description: Bounded contradiction likelihood score.
        severity:
          type: string
          enum: [low, medium, high]
          description: Severity band derived from the contradiction score.

    DroppedContextChunk:
      type: object
      required: [id, reason, duplicateOf, inputTokens]
      properties:
        id:
          type: string
        reason:
          type: string
          enum: [duplicate, near_duplicate]
        duplicateOf:
          type: string
        similarity:
          type: number
          description: Similarity score for near-duplicate drops.
        inputTokens:
          type: integer

    RiskyContextChunk:
      allOf:
        - $ref: "#/components/schemas/OptimizedContextChunk"
        - type: object
          required: [decision, ruleName, matchedContent]
          properties:
            decision:
              type: string
              enum: [flag, quarantine, redact, block]
            ruleName:
              type: string
              nullable: true
            matchedContent:
              type: string
              nullable: true

    ContextOptimizationResult:
      type: object
      required: [optimized, dropped, conflicts, flagged, quarantined, metrics]
      properties:
        optimized:
          type: array
          items:
            $ref: "#/components/schemas/OptimizedContextChunk"
        dropped:
          type: array
          items:
            $ref: "#/components/schemas/DroppedContextChunk"
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/ContextConflict"
        flagged:
          type: array
          items:
            $ref: "#/components/schemas/RiskyContextChunk"
        quarantined:
          type: array
          items:
            $ref: "#/components/schemas/RiskyContextChunk"
        metrics:
          type: object
          required: [inputChunks, outputChunks, droppedChunks, nearDuplicateChunks, flaggedChunks, quarantinedChunks, inputTokens, outputTokens, savedTokens, reductionPct, avgRelevanceScore, lowRelevanceChunks, rerankedChunks, avgFreshnessScore, staleChunks, conflictChunks, conflictGroups, compressedChunks, compressionSavedTokens, compressionRatePct]
          properties:
            inputChunks: { type: integer }
            outputChunks: { type: integer }
            droppedChunks: { type: integer }
            nearDuplicateChunks: { type: integer }
            flaggedChunks: { type: integer }
            quarantinedChunks: { type: integer }
            inputTokens: { type: integer }
            outputTokens: { type: integer }
            savedTokens: { type: integer }
            reductionPct:
              type: number
            avgRelevanceScore:
              type: number
              nullable: true
            lowRelevanceChunks: { type: integer }
            rerankedChunks: { type: integer }
            avgFreshnessScore:
              type: number
              nullable: true
            staleChunks: { type: integer }
            conflictChunks: { type: integer }
            conflictGroups: { type: integer }
            compressedChunks: { type: integer }
            compressionSavedTokens: { type: integer }
            compressionRatePct: { type: number }

    ContextOptimizationEvent:
      type: object
      required:
        - id
        - tenantId
        - inputChunks
        - outputChunks
        - droppedChunks
        - nearDuplicateChunks
        - inputTokens
        - outputTokens
        - savedTokens
        - reductionPct
        - avgRelevanceScore
        - lowRelevanceChunks
        - rerankedChunks
        - avgFreshnessScore
        - staleChunks
        - conflictChunks
        - conflictGroups
        - compressedChunks
        - compressionSavedTokens
        - compressionRatePct
        - conflictSourceIds
        - conflictDetails
        - duplicateSourceIds
        - nearDuplicateSourceIds
        - riskScanned
        - flaggedChunks
        - quarantinedChunks
        - riskySourceIds
        - riskDetails
        - createdAt
      properties:
        id:
          type: string
        tenantId:
          type: string
          nullable: true
        inputChunks:
          type: integer
        outputChunks:
          type: integer
        droppedChunks:
          type: integer
        nearDuplicateChunks:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        savedTokens:
          type: integer
        reductionPct:
          type: number
        avgRelevanceScore:
          type: number
          nullable: true
        lowRelevanceChunks:
          type: integer
        rerankedChunks:
          type: integer
        avgFreshnessScore:
          type: number
          nullable: true
        staleChunks:
          type: integer
        conflictChunks:
          type: integer
        conflictGroups:
          type: integer
        compressedChunks:
          type: integer
        compressionSavedTokens:
          type: integer
        compressionRatePct:
          type: number
        conflictSourceIds:
          type: array
          items:
            type: string
        conflictDetails:
          type: array
          items:
            $ref: "#/components/schemas/ContextConflict"
        duplicateSourceIds:
          type: array
          items:
            type: string
        nearDuplicateSourceIds:
          type: array
          items:
            type: string
        riskScanned:
          type: boolean
        flaggedChunks:
          type: integer
        quarantinedChunks:
          type: integer
        riskySourceIds:
          type: array
          items:
            type: string
        riskDetails:
          type: array
          items:
            type: object
            required: [id, decision, ruleName, matchedContent]
            properties:
              id:
                type: string
              decision:
                type: string
                enum: [flag, quarantine, redact, block]
              ruleName:
                type: string
                nullable: true
              matchedContent:
                type: string
                nullable: true
        createdAt:
          type: string
          format: date-time

    ContextOptimizationSummary:
      type: object
      required:
        - eventCount
        - inputChunks
        - outputChunks
        - droppedChunks
        - nearDuplicateChunks
        - inputTokens
        - outputTokens
        - savedTokens
        - reductionPct
        - avgRelevanceScore
        - lowRelevanceChunks
        - rerankedChunks
        - avgFreshnessScore
        - staleChunks
        - conflictChunks
        - conflictGroups
        - compressedChunks
        - compressionSavedTokens
        - compressionRatePct
        - flaggedChunks
        - quarantinedChunks
        - latestAt
      properties:
        eventCount:
          type: integer
        inputChunks:
          type: integer
        outputChunks:
          type: integer
        droppedChunks:
          type: integer
        nearDuplicateChunks:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        savedTokens:
          type: integer
        reductionPct:
          type: number
        avgRelevanceScore:
          type: number
          nullable: true
        lowRelevanceChunks:
          type: integer
        rerankedChunks:
          type: integer
        avgFreshnessScore:
          type: number
          nullable: true
        staleChunks:
          type: integer
        conflictChunks:
          type: integer
        conflictGroups:
          type: integer
        compressedChunks:
          type: integer
        compressionSavedTokens:
          type: integer
        compressionRatePct:
          type: number
        flaggedChunks:
          type: integer
        quarantinedChunks:
          type: integer
        latestAt:
          type: string
          format: date-time
          nullable: true

    CreateContextCollectionRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000

    IngestContextDocumentRequest:
      type: object
      required: [text]
      properties:
        title:
          type: string
          maxLength: 200
        text:
          type: string
          minLength: 1
          maxLength: 500000
        source:
          type: string
          maxLength: 120
        sourceUri:
          type: string
          maxLength: 2000
        metadata:
          type: object
          additionalProperties: true

    CreateContextSourceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        type:
          type: string
          enum: [manual, github_repository, file_upload, s3_bucket]
        externalId:
          type: string
          maxLength: 2000
        sourceUri:
          type: string
          maxLength: 2000
        content:
          type: string
          description: Required for manual and file_upload sources.
          maxLength: 500000
        github:
          $ref: "#/components/schemas/GitHubContextSourceConfig"
        file:
          $ref: "#/components/schemas/FileUploadContextSourceConfig"
        s3:
          $ref: "#/components/schemas/S3ContextSourceConfig"
        metadata:
          type: object
          additionalProperties: true

    FileUploadContextSourceConfig:
      type: object
      required: [filename]
      properties:
        filename:
          type: string
          minLength: 1
          maxLength: 240
        contentType:
          type: string
          maxLength: 120

    S3ContextSourceConfig:
      type: object
      required: [bucket, region, credentialId]
      properties:
        bucket:
          type: string
          minLength: 3
          maxLength: 63
        region:
          type: string
          minLength: 1
          maxLength: 64
        prefix:
          type: string
          maxLength: 1000
        credentialId:
          type: string
          description: Tenant-scoped aws_access_key connector credential id.
        extensions:
          type: array
          description: Object key extensions to ingest. Defaults to documentation/text extensions.
          minItems: 1
          maxItems: 20
          items:
            type: string
            maxLength: 24
        maxFileBytes:
          type: integer
          minimum: 1
          maximum: 250000
          default: 250000
        maxFiles:
          type: integer
          minimum: 1
          maximum: 100
          default: 100

    CreateContextConnectorCredentialRequest:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        type:
          type: string
          enum: [github_token, aws_access_key]
        value:
          type: string
          minLength: 1
          maxLength: 20000
          description: Secret token value. For aws_access_key, pass a JSON string with accessKeyId, secretAccessKey, and optional sessionToken. Only accepted on write and never returned.

    ContextConnectorCredential:
      type: object
