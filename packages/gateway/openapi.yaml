openapi: 3.0.3
info:
  title: Provara Gateway API
  version: 0.1.0
  description: Multi-provider LLM gateway with intelligent routing, A/B testing, and cost optimization.

servers:
  - url: http://localhost:4000
    description: Local
  - url: https://provara-gateway-production.up.railway.app
    description: Railway Production

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /v1/chat/completions:
    post:
      tags: [Chat]
      summary: Chat completions (OpenAI-compatible)
      operationId: chatCompletions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model:
                  type: string
                  example: gpt-4o-mini
                messages:
                  type: array
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                  example:
                    - role: user
                      content: Hello, how are you?
                provider:
                  type: string
                  description: Force a specific provider
                  example: openai
                stream:
                  type: boolean
                  default: false
                temperature:
                  type: number
                  example: 0.7
                max_tokens:
                  type: integer
                  example: 1024
                routing_hint:
                  type: string
                  enum: [general, coding, qa, creative, summarization, reasoning]
                  description: Task type hint; bypasses classifier for cell assignment
                complexity_hint:
                  type: string
                  enum: [simple, medium, complex]
                  description: Complexity hint paired with routing_hint (used when pinning a model so the sample lands in a specific cell rather than general/medium)
                cache:
                  type: boolean
                  description: Enable/disable caching for this request
      responses:
        "200":
          description: Chat completion response
          headers:
            X-Provara-Request-Id:
              description: Opaque id for the persisted request row; use it to POST feedback for this completion
              schema:
                type: string
            X-Provara-Model:
              description: The model that actually answered (may differ from requested model if fallback kicked in)
              schema:
                type: string
            X-Provara-Provider:
              description: The provider that actually answered
              schema:
                type: string
            X-Provara-Errors:
              description: Present only when `_provara.routing.usedFallback = true`. JSON-encoded array of `{provider, model, error}` tuples for each failed attempt before the fallback chain succeeded.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionResponse"

  /v1/providers:
    get:
      tags: [Providers]
      summary: List active providers and models
      operationId: listProviders
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        models:
                          type: array
                          items:
                            type: string

  /v1/providers/reload:
    post:
      tags: [Providers]
      summary: Reload provider registry
      operationId: reloadProviders
      responses:
        "200":
          description: Reloaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  reloaded:
                    type: boolean
                  providers:
                    type: array
                    items:
                      type: object

  /v1/admin/providers:
    get:
      tags: [Custom Providers]
      summary: List custom providers
      operationId: listCustomProviders
      responses:
        "200":
          description: Custom provider list

    post:
      tags: [Custom Providers]
      summary: Add a custom provider
      operationId: addCustomProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, baseURL, models]
              properties:
                name:
                  type: string
                  example: together
                baseURL:
                  type: string
                  example: https://api.together.xyz/v1
                apiKeyRef:
                  type: string
                  example: TOGETHER_API_KEY
                models:
                  type: array
                  items:
                    type: string
                  example:
                    - meta-llama/Llama-3-70b-chat-hf
      responses:
        "201":
          description: Created

  /v1/admin/providers/{id}:
    patch:
      tags: [Custom Providers]
      summary: Update a custom provider
      operationId: updateCustomProvider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                baseURL:
                  type: string
                models:
                  type: array
                  items:
                    type: string
                enabled:
                  type: boolean
      responses:
        "200":
          description: Updated

    delete:
      tags: [Custom Providers]
      summary: Delete a custom provider
      operationId: deleteCustomProvider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /v1/admin/providers/{id}/discover:
    post:
      tags: [Custom Providers]
      summary: Discover models from a custom provider
      operationId: discoverModels
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Discovered models

  /v1/admin/providers/validate:
    post:
      tags: [Custom Providers]
      summary: Validate a provider endpoint
      operationId: validateProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseURL]
              properties:
                baseURL:
                  type: string
                apiKey:
                  type: string
      responses:
        "200":
          description: Validation result

  /v1/api-keys/status:
    get:
      tags: [API Keys]
      summary: Check master key status
      operationId: apiKeyStatus
      responses:
        "200":
          description: Master key status

  /v1/api-keys:
    get:
      tags: [API Keys]
      summary: List stored API keys
      operationId: listApiKeys
      responses:
        "200":
          description: API key list

    post:
      tags: [API Keys]
      summary: Store an API key
      operationId: storeApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, provider, value]
              properties:
                name:
                  type: string
                  example: OPENAI_API_KEY
                provider:
                  type: string
                  example: openai
                value:
                  type: string
                  example: sk-...
      responses:
        "201":
          description: Stored

  /v1/api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Delete a stored API key
      operationId: deleteApiKey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /v1/conversations:
    get:
      tags: [Conversations]
      summary: List saved playground conversations for current tenant
      operationId: listConversations
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Conversation list (summary only — messages not included)
          content:
            application/json:
              schema:
                type: object
                required: [conversations]
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConversationSummary"
    post:
      tags: [Conversations]
      summary: Create a saved conversation
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                title:
                  type: string
                  description: Optional title. Auto-generated from first user message if omitted.
                messages:
                  type: array
                  description: Serialized ChatMessage[] array.
                  items:
                    type: object
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"

  /v1/conversations/{id}:
    get:
      tags: [Conversations]
      summary: Get one conversation with full messages
      operationId: getConversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"
        "404":
          description: Not found
    patch:
      tags: [Conversations]
      summary: Update title and/or messages
      operationId: updateConversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
      responses:
        "200":
          description: Updated
    delete:
      tags: [Conversations]
      summary: Delete a conversation
      operationId: deleteConversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /v1/admin/tokens:
    get:
      tags: [Tokens]
      summary: List API tokens
      operationId: listTokens
      responses:
        "200":
          description: Token list

    post:
      tags: [Tokens]
      summary: Create an API token
      operationId: createToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, tenant]
              properties:
                name:
                  type: string
                  example: dev-token
                tenant:
                  type: string
                  example: team-alpha
                rateLimit:
                  type: integer
                  description: Requests per minute
                spendLimit:
                  type: number
                  description: USD per billing period
                spendPeriod:
                  type: string
                  enum: [monthly, weekly, daily]
                routingProfile:
                  type: string
                  enum: [cost, balanced, quality]
                expiresAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Created (returns plaintext token once)

  /v1/admin/tokens/{id}:
    get:
      tags: [Tokens]
      summary: Get token details
      operationId: getToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token details

    patch:
      tags: [Tokens]
      summary: Update a token
      operationId: updateToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                rateLimit:
                  type: integer
                spendLimit:
                  type: number
                spendPeriod:
                  type: string
                routingProfile:
                  type: string
      responses:
        "200":
          description: Updated

    delete:
      tags: [Tokens]
      summary: Delete a token
      operationId: deleteToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /v1/admin/tokens/usage/by-tenant:
    get:
      tags: [Tokens]
      summary: Usage breakdown by tenant
      operationId: usageByTenant
      responses:
        "200":
          description: Tenant usage stats

  /v1/ab-tests:
    get:
      tags: [A/B Tests]
      summary: List A/B tests
      operationId: listAbTests
      responses:
        "200":
          description: A/B test list

    post:
      tags: [A/B Tests]
      summary: Create an A/B test
      operationId: createAbTest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, variants]
              properties:
                name:
                  type: string
                  example: GPT-4o vs Claude Sonnet
                description:
                  type: string
                variants:
                  type: array
                  items:
                    type: object
                    required: [provider, model]
                    properties:
                      provider:
                        type: string
                      model:
                        type: string
                      weight:
                        type: number
                        default: 1
                      taskType:
                        type: string
                      complexity:
                        type: string
                  example:
                    - provider: openai
                      model: gpt-4o
                      weight: 1
                    - provider: anthropic
                      model: claude-sonnet-4-20250514
                      weight: 1
      responses:
        "201":
          description: Created

  /v1/ab-tests/{id}:
    get:
      tags: [A/B Tests]
      summary: Get A/B test with variants and stats
      operationId: getAbTest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A/B test details

    patch:
      tags: [A/B Tests]
      summary: Update A/B test status
      operationId: updateAbTest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, paused, completed]
      responses:
        "200":
          description: Updated

    delete:
      tags: [A/B Tests]
      summary: Delete an A/B test
      operationId: deleteAbTest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /v1/feedback:
    get:
      tags: [Feedback]
      summary: List feedback entries
      operationId: listFeedback
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Feedback list

    post:
      tags: [Feedback]
      summary: Submit or update user feedback for a request
      description: |
        Upserts on `(requestId, source='user', tenantId)`. First submission inserts a row
        and pushes the score into the adaptive EMA; subsequent submissions update the
        existing row's score in place and do not re-feed the EMA (avoids double-counting
        the same user's iteration). The response distinguishes insert from update via the
        `updated` boolean.
      operationId: submitFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId, score]
              properties:
                requestId:
                  type: string
                  description: Opaque id from the `X-Provara-Request-Id` response header on the original completion.
                score:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        "200":
          description: Existing feedback row updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSubmitResponse"
        "201":
          description: New feedback row created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSubmitResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          description: Request not found for this tenant

  /v1/feedback/quality/by-cell:
    get:
      tags: [Feedback]
      summary: Quality scores by routing cell
      operationId: qualityByCell
      responses:
        "200":
          description: Quality breakdown

  /v1/feedback/quality/by-model:
    get:
      tags: [Feedback]
      summary: Quality scores by model
      operationId: qualityByModel
      responses:
        "200":
          description: Quality breakdown

  /v1/feedback/quality/trend:
    get:
      tags: [Feedback]
      summary: Quality score trend over time
      operationId: qualityTrend
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [24h, 7d, 30d]
            default: 7d
          description: Time window. `24h` buckets hourly; `7d` and `30d` bucket daily.
      responses:
        "200":
          description: Time-series of avg quality scores bucketed by hour or day
          content:
            application/json:
              schema:
                type: object
                properties:
                  range:
                    type: string
                  series:
                    type: array
                    items:
                      type: object
                      properties:
                        bucket:
                          type: string
                          example: "2026-04-16"
                        avgScore:
                          type: number
                          format: float
                        count:
                          type: integer
                        userCount:
                          type: integer
                        judgeCount:
                          type: integer

  /v1/feedback/judge/config:
    get:
      tags: [Feedback]
      summary: Get LLM judge configuration
      operationId: getJudgeConfig
      responses:
        "200":
          description: Current judge configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JudgeConfig"
    put:
      tags: [Feedback]
      summary: Update LLM judge configuration
      description: |
        All fields optional — only the ones you send are updated. Set `provider` and
        `model` together to pin the judge to a specific model; set both to `null` to
        fall back to auto (cheapest registered model).
      operationId: setJudgeConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                sampleRate:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                provider:
                  type: string
                  nullable: true
                model:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated judge config (current effective state)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JudgeConfig"

  /v1/routing/config:
    get:
      tags: [Routing]
      summary: Get routing configuration
      operationId: getRoutingConfig
      responses:
        "200":
          description: Current routing configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingConfig"
    put:
      tags: [Routing]
      summary: Update routing configuration
      operationId: setRoutingConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                abTestPreempts:
                  type: boolean
                  description: |
                    When `true` (default), an active A/B test on a cell takes precedence over
                    adaptive routing. When `false`, adaptive routing wins if it has enough
                    samples, and A/B tests only fire when adaptive can't help.
      responses:
        "200":
          description: Updated routing config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingConfig"

  /v1/analytics/pipeline:
    get:
      tags: [Analytics]
      summary: Routing pipeline stage statistics
      description: |
        Per-stage request counts and latencies for the routing pipeline visualization.
        Includes `userOverride` (requests pinned to a specific model by the caller) and
        true `fallback` events (provider failures that triggered the fallback chain) as
        distinct stages.
      operationId: pipelineStats
      responses:
        "200":
          description: Pipeline statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStats"

  /v1/analytics/requests:
    get:
      tags: [Analytics]
      summary: List requests with pagination
      operationId: listRequests
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: provider
          in: query
          schema:
            type: string
        - name: model
          in: query
          schema:
            type: string
        - name: taskType
          in: query
          schema:
            type: string
        - name: orderBy
          in: query
          description: Column to sort by. Values outside the server whitelist are ignored (falls back to `createdAt`).
          schema:
            type: string
            enum: [createdAt, latencyMs, inputTokens, outputTokens, provider, model, taskType, complexity, routedBy, cost]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated request list including `cached`, `usedFallback`, and `fallbackErrors` per row.
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/RequestLogRow"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /v1/analytics/requests/{id}:
    get:
      tags: [Analytics]
      summary: Get full detail for a single request
      operationId: getRequest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Request detail with persisted routing metadata and fallback errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestLogRow"
        "404":
          description: Request not found for this tenant

  /v1/analytics/overview:
    get:
      tags: [Analytics]
      summary: Dashboard overview stats
      operationId: analyticsOverview
      responses:
        "200":
          description: Overview metrics

  /v1/analytics/costs/by-provider:
    get:
      tags: [Analytics]
      summary: Cost breakdown by provider
      operationId: costsByProvider
      responses:
        "200":
          description: Provider costs

  /v1/analytics/costs/by-model:
    get:
      tags: [Analytics]
      summary: Cost breakdown by model
      operationId: costsByModel
      responses:
        "200":
          description: Model costs

  /v1/analytics/routing/stats:
    get:
      tags: [Analytics]
      summary: Routing method statistics
      operationId: routingStats
      responses:
        "200":
          description: Routing stats

  /v1/analytics/routing/distribution:
    get:
      tags: [Analytics]
      summary: Request distribution by provider
      operationId: routingDistribution
      responses:
        "200":
          description: Distribution data

  /v1/analytics/adaptive/scores:
    get:
      tags: [Analytics]
      summary: Adaptive routing EMA scores
      operationId: adaptiveScores
      responses:
        "200":
          description: Adaptive scores by cell

  /v1/cache/stats:
    get:
      tags: [Cache]
      summary: Cache hit/miss statistics
      operationId: cacheStats
      responses:
        "200":
          description: Cache stats

  /v1/analytics/cache/savings:
    get:
      tags: [Cache, Analytics]
      summary: Tokens saved by cache hits (exact + semantic)
      description: |
        Sum of input and output tokens that were served from cache and therefore
        not billed to the upstream provider. Broken down by cache source (exact
        vs semantic) and by model.
      operationId: cacheSavings
      responses:
        "200":
          description: Savings stats
          content:
            application/json:
              schema:
                type: object
                required: [tokensSavedInput, tokensSavedOutput, tokensSavedTotal, hits, hitRate, byModel]
                properties:
                  tokensSavedInput:
                    type: integer
                  tokensSavedOutput:
                    type: integer
                  tokensSavedTotal:
                    type: integer
                  hits:
                    type: object
                    properties:
                      exact: { type: integer }
                      semantic: { type: integer }
                      total: { type: integer }
                  hitRate:
                    type: number
                    description: Cache hits / total requests (0–1)
                  byModel:
                    type: array
                    items:
                      type: object
                      properties:
                        provider: { type: string }
                        model: { type: string }
                        tokensSavedInput: { type: integer }
                        tokensSavedOutput: { type: integer }
                        hits: { type: integer }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Provara API token (prefixed `pvra_`)
    SessionCookie:
      type: apiKey
      in: cookie
      name: provara_session
      description: Dashboard session cookie, set after OAuth sign-in. Used for admin endpoints.

  responses:
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    ConversationSummary:
      type: object
      required: [id, title, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationDetail:
      allOf:
        - $ref: "#/components/schemas/ConversationSummary"
        - type: object
          required: [messages]
          properties:
            messages:
              type: array
              description: Full ChatMessage[] for this conversation.
              items:
                type: object

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type]
          properties:
            message:
              type: string
            type:
              type: string
              example: validation_error

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string

    RoutingMetadata:
      type: object
      required: [taskType, complexity, routedBy, usedFallback]
      properties:
        taskType:
          type: string
          example: general
        complexity:
          type: string
          enum: [simple, medium, complex]
        routedBy:
          type: string
          enum: [classification, routing-hint, ab-test, adaptive, exploration, user-override]
          description: Which branch of the routing engine picked the target.
        usedFallback:
          type: boolean
          description: True if the primary provider errored and the fallback chain was used.
        usedLlmFallback:
          type: boolean
          description: True if the classifier's primary path failed and an LLM-based fallback classifier was used.

    FallbackAttemptError:
      type: object
      required: [provider, model, error]
      properties:
        provider:
          type: string
        model:
          type: string
        error:
          type: string

    ProvaraMetadata:
      type: object
      required: [provider, latencyMs, cached, routing]
      properties:
        provider:
          type: string
          description: The provider that actually answered (may differ from requested if fallback fired).
        latencyMs:
          type: integer
        cached:
          type: boolean
          description: True if this response was served from the local completion cache.
        cacheSource:
          type: string
          enum: [exact, semantic]
          description: Which cache layer served the response. Only present when `cached = true`.
        routing:
          $ref: "#/components/schemas/RoutingMetadata"
        errors:
          type: array
          description: Present only when `routing.usedFallback = true`. One entry per failed attempt before the fallback chain succeeded.
          items:
            $ref: "#/components/schemas/FallbackAttemptError"

    CompletionResponse:
      type: object
      description: OpenAI-compatible chat completion response with a Provara-specific `_provara` extension.
      required: [id, object, model, choices, usage, _provara]
      properties:
        id:
          type: string
          example: chatcmpl-abc123
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          description: Unix seconds
        model:
          type: string
          description: The model that actually answered.
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                $ref: "#/components/schemas/ChatMessage"
              finish_reason:
                type: string
                example: stop
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
        _provara:
          $ref: "#/components/schemas/ProvaraMetadata"

    FeedbackSubmitResponse:
      type: object
      required: [id, requestId, score, updated]
      properties:
        id:
          type: string
          description: Feedback row id.
        requestId:
          type: string
        score:
          type: integer
          minimum: 1
          maximum: 5
        updated:
          type: boolean
          description: False on first insert, true when an existing user-feedback row for this request was updated in place.

    JudgeConfig:
      type: object
      required: [enabled, sampleRate]
      properties:
        enabled:
          type: boolean
        sampleRate:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Probability a completed request gets scored by the LLM judge.
        provider:
          type: string
          nullable: true
          description: Pinned provider, or null for auto (cheapest).
        model:
          type: string
          nullable: true
          description: Pinned model, or null for auto. Must pair with `provider`.

    RoutingConfig:
      type: object
      required: [abTestPreempts]
      properties:
        abTestPreempts:
          type: boolean
          description: See PUT /v1/routing/config docs.

    RequestLogRow:
      type: object
      required: [id, provider, model, createdAt]
      properties:
        id:
          type: string
        provider:
          type: string
        model:
          type: string
        prompt:
          type: string
          description: JSON-encoded ChatMessage[]
        response:
          type: string
          nullable: true
        inputTokens:
          type: integer
          nullable: true
        outputTokens:
          type: integer
          nullable: true
        latencyMs:
          type: integer
          nullable: true
        cost:
          type: number
          format: float
          nullable: true
        taskType:
          type: string
          nullable: true
        complexity:
          type: string
          nullable: true
        routedBy:
          type: string
          nullable: true
        usedFallback:
          type: boolean
        cached:
          type: boolean
          description: True if this row was written by a cache hit (no provider call was made).
        cacheSource:
          type: string
          nullable: true
          enum: [exact, semantic]
          description: Which cache layer served this row. Null when `cached = false`.
        tokensSavedInput:
          type: integer
          nullable: true
          description: Input tokens that would have been billed but weren't. Non-null only on cache hits.
        tokensSavedOutput:
          type: integer
          nullable: true
          description: Output tokens that would have been billed but weren't. Non-null only on cache hits.
        fallbackErrors:
          type: string
          nullable: true
          description: JSON-encoded FallbackAttemptError[] for requests where `usedFallback = true`. Null otherwise.
        tenantId:
          type: string
          nullable: true
        abTestId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    PipelineStageStats:
      type: object
      required: [count, active]
      properties:
        count:
          type: integer
        avgLatency:
          type: integer
        active:
          type: boolean
        activeTests:
          type: integer
        feedbackCount:
          type: integer
        providerCount:
          type: integer
        rate:
          type: number
          description: ε-greedy exploration rate (only present on the `exploration` stage)

    PipelineStats:
      type: object
      required: [totalRequests, stages]
      properties:
        totalRequests:
          type: integer
        stages:
          type: object
          properties:
            classifier:
              $ref: "#/components/schemas/PipelineStageStats"
            userOverride:
              $ref: "#/components/schemas/PipelineStageStats"
            abTest:
              $ref: "#/components/schemas/PipelineStageStats"
            adaptive:
              $ref: "#/components/schemas/PipelineStageStats"
            exploration:
              $ref: "#/components/schemas/PipelineStageStats"
            fallback:
              $ref: "#/components/schemas/PipelineStageStats"
            providers:
              $ref: "#/components/schemas/PipelineStageStats"

security:
  - BearerAuth: []
  - SessionCookie: []

tags:
  - name: Chat
    description: OpenAI-compatible chat completions endpoint.
  - name: Feedback
    description: User ratings, LLM judge scoring, and quality analytics.
  - name: Routing
    description: Routing engine configuration.
  - name: Providers
    description: Active provider registry.
  - name: Analytics
    description: Request logs, costs, routing stats, pipeline visualization.
  - name: A/B Tests
    description: Weighted traffic splitting for controlled model comparisons.
  - name: Tokens
    description: API token management for programmatic access to the gateway.
  - name: API Keys
    description: Provider-side API key storage (encrypted at rest).
  - name: Custom Providers
    description: Registering additional OpenAI-compatible providers.
  - name: Cache
    description: Completion cache inspection.
  - name: System
    description: Health and meta endpoints.
