  /v1/conversations:
    get:
      tags: [Conversations]
      summary: List saved playground conversations for current tenant
      operationId: listConversations
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Conversation list (summary only — messages not included)
          content:
            application/json:
              schema:
                type: object
                required: [conversations]
                properties:
                  conversations:
