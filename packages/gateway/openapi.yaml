    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string

    RoutingMetadata:
      type: object
      required: [taskType, complexity, routedBy, usedFallback]
      properties:
        taskType:
          type: string
          example: general
        complexity:
          type: string
          enum: [simple, medium, complex]
        routedBy:
          type: string
          enum: [classification, routing-hint, ab-test, adaptive, exploration, user-override]
          description: Which branch of the routing engine picked the target.
        usedFallback:
          type: boolean
          description: True if the primary provider errored and the fallback chain was used.
        usedLlmFallback:
          type: boolean
          description: True if the classifier's primary path failed and an LLM-based fallback classifier was used.

    FallbackAttemptError:
      type: object
      required: [provider, model, error]
      properties:
        provider:
          type: string
        model:
          type: string
        error:
          type: string

    ProvaraMetadata:
      type: object
      required: [provider, latencyMs, cached, routing]
      properties:
        provider:
          type: string
          description: The provider that actually answered (may differ from requested if fallback fired).
        latencyMs:
          type: integer
        cached:
          type: boolean
          description: True if this response was served from the local completion cache.
        cacheSource:
          type: string
          enum: [exact, semantic]
          description: Which cache layer served the response. Only present when `cached = true`.
        routing:
          $ref: "#/components/schemas/RoutingMetadata"
        errors:
          type: array
          description: Present only when `routing.usedFallback = true`. One entry per failed attempt before the fallback chain succeeded.
          items:
            $ref: "#/components/schemas/FallbackAttemptError"

    CompletionResponse:
      type: object
      description: OpenAI-compatible chat completion response with a Provara-specific `_provara` extension.
      required: [id, object, model, choices, usage, _provara]
      properties:
        id:
          type: string
          example: chatcmpl-abc123
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          description: Unix seconds
        model:
          type: string
          description: The model that actually answered.
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                $ref: "#/components/schemas/ChatMessage"
              finish_reason:
                type: string
                example: stop
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
        _provara:
          $ref: "#/components/schemas/ProvaraMetadata"

    FeedbackSubmitResponse:
      type: object
      required: [id, requestId, score, updated]
      properties:
        id:
          type: string
          description: Feedback row id.
        requestId:
          type: string
        score:
          type: integer
          minimum: 1
          maximum: 5
        updated:
          type: boolean
          description: False on first insert, true when an existing user-feedback row for this request was updated in place.

    JudgeConfig:
      type: object
      required: [enabled, sampleRate]
      properties:
        enabled:
          type: boolean
        sampleRate:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Probability a completed request gets scored by the LLM judge.
        provider:
          type: string
          nullable: true
          description: Pinned provider, or null for auto (cheapest).
        model:
          type: string
          nullable: true
          description: Pinned model, or null for auto. Must pair with `provider`.

    RoutingConfig:
      type: object
      required: [abTestPreempts]
      properties:
        abTestPreempts:
          type: boolean
          description: See PUT /v1/routing/config docs.

    RequestLogRow:
      type: object
      required: [id, provider, model, createdAt]
      properties:
        id:
          type: string
        provider:
          type: string
        model:
          type: string
        prompt:
          type: string
          description: JSON-encoded ChatMessage[]
        response:
          type: string
          nullable: true
        inputTokens:
          type: integer
          nullable: true
        outputTokens:
          type: integer
          nullable: true
        latencyMs:
          type: integer
          nullable: true
        cost:
          type: number
          format: float
          nullable: true
        taskType:
          type: string
          nullable: true
        complexity:
          type: string
          nullable: true
        routedBy:
          type: string
          nullable: true
        usedFallback:
          type: boolean
        cached:
          type: boolean
          description: True if this row was written by a cache hit (no provider call was made).
        cacheSource:
          type: string
          nullable: true
          enum: [exact, semantic]
          description: Which cache layer served this row. Null when `cached = false`.
        tokensSavedInput:
          type: integer
          nullable: true
          description: Input tokens that would have been billed but weren't. Non-null only on cache hits.
        tokensSavedOutput:
          type: integer
          nullable: true
          description: Output tokens that would have been billed but weren't. Non-null only on cache hits.
        fallbackErrors:
          type: string
          nullable: true
          description: JSON-encoded FallbackAttemptError[] for requests where `usedFallback = true`. Null otherwise.
        tenantId:
          type: string
          nullable: true
        abTestId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    PipelineStageStats:
      type: object
      required: [count, active]
      properties:
        count:
          type: integer
        avgLatency:
          type: integer
        active:
          type: boolean
        activeTests:
          type: integer
        feedbackCount:
          type: integer
        providerCount:
          type: integer
        rate:
          type: number
          description: ε-greedy exploration rate (only present on the `exploration` stage)

    RegressionEvent:
      type: object
      required: [id, taskType, complexity, provider, model, replayCount, originalMean, replayMean, delta, costUsd, detectedAt]
      properties:
        id: { type: string }
        tenantId: { type: string, nullable: true }
        taskType: { type: string }
        complexity: { type: string }
        provider: { type: string }
        model: { type: string }
        replayCount: { type: integer }
        originalMean: { type: number, description: "Mean baseline score at capture time (1–5)" }
        replayMean: { type: number, description: "Mean judge score on re-runs (1–5)" }
        delta: { type: number, description: "replayMean − originalMean. Negative = regression." }
        costUsd: { type: number, description: "Total judge + replay API spend this detection cycle." }
        detectedAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }
        resolutionNote: { type: string, nullable: true }

    CostMigration:
      type: object
      required: [id, taskType, complexity, fromProvider, fromModel, toProvider, toModel, projectedMonthlySavingsUsd, graceEndsAt, executedAt]
      properties:
        id: { type: string }
        tenantId: { type: string, nullable: true }
        taskType: { type: string }
        complexity: { type: string }
        fromProvider: { type: string }
        fromModel: { type: string }
        fromCostPer1M: { type: number }
        fromQualityScore: { type: number }
        toProvider: { type: string }
        toModel: { type: string }
        toCostPer1M: { type: number }
        toQualityScore: { type: number }
        projectedMonthlySavingsUsd: { type: number }
        graceEndsAt: { type: string, format: date-time }
        executedAt: { type: string, format: date-time }
        rolledBackAt: { type: string, format: date-time, nullable: true }
        rollbackReason: { type: string, nullable: true }

    SchedulerJob:
      type: object
      required: [name, enabled, intervalMs, runCount]
      properties:
        name: { type: string }
        enabled: { type: boolean }
        intervalMs: { type: integer }
        runCount: { type: integer }
        lastRunAt: { type: string, format: date-time, nullable: true }
        lastStatus:
          type: string
          enum: [ok, error, skipped]
          nullable: true
        lastError: { type: string, nullable: true }
        lastDurationMs: { type: integer, nullable: true }

    PipelineStats:
      type: object
      required: [totalRequests, stages]
      properties:
        totalRequests:
          type: integer
        stages:
          type: object
          properties:
            classifier:
              $ref: "#/components/schemas/PipelineStageStats"
            userOverride:
              $ref: "#/components/schemas/PipelineStageStats"
            abTest:
              $ref: "#/components/schemas/PipelineStageStats"
            adaptive:
              $ref: "#/components/schemas/PipelineStageStats"
            exploration:
              $ref: "#/components/schemas/PipelineStageStats"
            fallback:
              $ref: "#/components/schemas/PipelineStageStats"
            providers:
              $ref: "#/components/schemas/PipelineStageStats"

